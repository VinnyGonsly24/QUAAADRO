  function projectScore(p,q){
    const text=normalize([p.name,...(p.tags||[]),...Object.values(p.boards||{}).flatMap(b=>[b.name,...(b.elements||[]).flatMap(e=>Object.values(e.data||{}).map(v=>typeof v==='string'?v:''))])].join(' '));

  function renderProjectMini(p,large=false){

    if(!els.length)return `<div class="project-mini"><div class="project-mini-empty">Projeto vazio</div></div>`;

    const move=ev=>{const x=ev.clientX-rect.left,y=ev.clientY-rect.top,left=Math.min(sx,x),top=Math.min(sy,y),right=Math.max(sx,x),bottom=Math.max(sy,y);Object.assign(box.style,{left:left+'px',top:top+'px',width:(right-left)+'px',height:(bottom-top)+'px'});const a=screenToWorld(rect.left+left,rect.top+top),b=screenToWorld(rect.left+right,rect.top+bottom);state.selectedIds=(activeBoard().elements||[]).filter(el=>el.x<b.x&&el.x+el.w>a.x&&el.y<b.y&&el.y+el.h>a.y).map(el=>el.id);renderNodeSelection()};
    const up=()=>{window.removeEventListener('pointermove',move);window.removeEventListener('pointerup',up);box.remove()};window.addEventListener('pointermove',move);window.addEventListener('pointerup',up);
  }
  function bindConnections(){
    $$('.connection-line').forEach(line=>line.addEventListener('contextmenu',e=>{e.preventDefault();e.stopPropagation();state.context={type:'connection',x:e.clientX,y:e.clientY,connectionId:line.dataset.connectionId};renderContextOnly()}));
  }
  function updateConnectionsDom(){const b=activeBoard(),byId=Object.fromEntries((b.elements||[]).map(e=>[e.id,e]));(b.connections||[]).forEach(c=>{const a=byId[c.fromId],z=byId[c.toId],line=$(`.connection-line[data-connection-id="${c.id}"]`);if(!a||!z||!line)return;line.setAttribute('x1',a.x+a.w/2);line.setAttribute('y1',a.y+a.h/2);line.setAttribute('x2',z.x+z.w/2);line.setAttribute('y2',z.y+z.h/2)})}

  function startResize(e,id){e.preventDefault();e.stopPropagation();const el=getElement(id);checkpoint();const start={x:e.clientX,y:e.clientY,w:el.w,h:el.h},minW=el.type==='color'?88:120,minH=el.type==='color'?100:70;const move=ev=>{el.w=Math.max(minW,start.w+(ev.clientX-start.x)/state.viewport.zoom);el.h=Math.max(minH,start.h+(ev.clientY-start.y)/state.viewport.zoom);const n=$(`.node[data-node-id="${id}"]`);if(n){n.style.width=el.w+'px';n.style.height=el.h+'px'}updateConnectionsDom()};const up=()=>{window.removeEventListener('pointermove',move);window.removeEventListener('pointerup',up);touchProject();scheduleSave();render()};window.addEventListener('pointermove',move);window.addEventListener('pointerup',up);}
  function startPan(e,canvas,world,grid){const start={x:e.clientX,y:e.clientY,vx:state.viewport.x,vy:state.viewport.y};state.panning=true;canvas.classList.add('panning');const move=ev=>{state.viewport.x=start.vx+ev.clientX-start.x;state.viewport.y=start.vy+ev.clientY-start.y;applyViewport(world,grid)};const up=()=>{state.panning=false;canvas.classList.remove('panning');window.removeEventListener('pointermove',move);window.removeEventListener('pointerup',up);scheduleSave()};window.addEventListener('pointermove',move);window.addEventListener('pointerup',up)}
  function fitView(){const els=activeBoard().elements;if(!els.length){state.viewport={x:80,y:80,zoom:1};render();scheduleSave();return}const minX=Math.min(...els.map(e=>e.x)),minY=Math.min(...els.map(e=>e.y)),maxX=Math.max(...els.map(e=>e.x+e.w)),maxY=Math.max(...els.map(e=>e.y+e.h));const c=$('#canvas').getBoundingClientRect(),pad=120;const zoom=Math.min(1.4,Math.max(.25,Math.min((c.width-pad)/(maxX-minX),(c.height-pad)/(maxY-minY))));state.viewport={x:(c.width-(maxX-minX)*zoom)/2-minX*zoom,y:(c.height-(maxY-minY)*zoom)/2-minY*zoom,zoom};render();scheduleSave()}
  function openBoard(id){const b=getBoard(activeProject(),id);if(!b)return;state.activeBoardId=id;state.viewport=clone(b.viewport||{x:0,y:0,zoom:1});state.selectedIds=[];state.connectingFromId=null;state.undo=[];state.redo=[];state.moreOpen=false;state.trashOpen=false;render();}
  function touchProject(){const p=activeProject();if(p)p.updatedAt=now();const b=activeBoard();if(b)b.updatedAt=now();}
  function trashElement(id,doCheckpoint=true){trashElements([id],doCheckpoint)}
  function trashElements(ids,doCheckpoint=true){
    const p=activeProject(),b=activeBoard(),unique=[...new Set(ids)].filter(id=>b.elements.some(e=>e.id===id));if(!unique.length)return;if(doCheckpoint)checkpoint();p.trash=p.trash||[];
    unique.forEach(id=>{const idx=b.elements.findIndex(e=>e.id===id);if(idx<0)return;const [element]=b.elements.splice(idx,1),connections=(b.connections||[]).filter(c=>c.fromId===id||c.toId===id);b.connections=(b.connections||[]).filter(c=>c.fromId!==id&&c.toId!==id);p.trash.unshift({id:uid(),element,connections,boardId:b.id,deletedAt:now()})});state.selectedIds=state.selectedIds.filter(x=>!unique.includes(x));touchProject();scheduleSave();render();toast(unique.length>1?'Itens enviados para a lixeira.':'Item enviado para a lixeira.');
  }

  function bindTrashPanel(){
    $$('.trash-item').forEach(row=>{const tid=row.dataset.trashId;row.querySelector('[data-restore]')?.addEventListener('click',()=>{checkpoint();const p=activeProject(),idx=p.trash.findIndex(t=>t.id===tid);if(idx<0)return;const [t]=p.trash.splice(idx,1);const target=getBoard(p,t.boardId)||activeBoard();target.elements.push(t.element);target.connections=target.connections||[];target.connections.push(...(t.connections||[]));touchProject();scheduleSave();render();toast('Item restaurado.');});row.querySelector('[data-permanent]')?.addEventListener('click',()=>{if(!confirm('Excluir permanentemente este item?'))return;checkpoint();const p=activeProject();p.trash=p.trash.filter(t=>t.id!==tid);touchProject();scheduleSave();cleanupUnusedAssets().catch(console.warn);render();});});
  }
  function bindBoardSearch(){const inp=$('#boardSearchInput');if(!inp)return;inp.addEventListener('input',e=>{state.boardSearchQuery=e.target.value;render();setTimeout(()=>{const x=$('#boardSearchInput');x?.focus();x?.setSelectionRange(x.value.length,x.value.length)},0)});$$('[data-search-node]').forEach(btn=>btn.addEventListener('click',()=>{const [bid,nid]=btn.dataset.searchNode.split(',');openBoard(bid);setTimeout(()=>{state.selectedIds=[nid];const el=getElement(nid);if(el){const c=$('#canvas').getBoundingClientRect();state.viewport.x=c.width/2-(el.x+el.w/2)*state.viewport.zoom;state.viewport.y=c.height/2-(el.y+el.h/2)*state.viewport.zoom;render()}},0)}));}
  function renderContextOnly(){document.querySelector('.context-menu')?.remove();const temp=document.createElement('div');temp.innerHTML=renderContextMenu();document.body.appendChild(temp.firstElementChild);bindContext();}
  function bindContext(){
    const c=state.context;
    $('[data-connection-color]')?.addEventListener('input',e=>{const line=(activeBoard().connections||[]).find(x=>x.id===c.connectionId);if(line){checkpoint();line.color=e.target.value;touchProject();scheduleSave();render()}});
    $('[data-arrow-color]')?.addEventListener('input',e=>{const el=getElement(c.nodeId);if(el){checkpoint();el.data.color=e.target.value;touchProject();scheduleSave();render()}});
    $('[data-board-color]')?.addEventListener('input',e=>{const el=getElement(c.nodeId);if(el){checkpoint();el.data.color=e.target.value;touchProject();scheduleSave();render()}});
    $$('[data-context]').forEach(btn=>btn.addEventListener('click',()=>{const action=btn.dataset.context;
      if(c?.type==='connection'){const b=activeBoard(),line=(b.connections||[]).find(x=>x.id===c.connectionId);if(!line)return;if(action==='deleteConnection'){checkpoint();b.connections=b.connections.filter(x=>x.id!==line.id)}else if(action==='connectionSolid'||action==='connectionDashed'||action==='connectionDotted'){checkpoint();line.style=action==='connectionSolid'?'solid':action==='connectionDashed'?'dashed':'dotted'}touchProject();scheduleSave();render();return;}
      const id=c?.nodeId,el=getElement(id);if(!id||!el)return;
      if(action==='connectOne'){if(!state.connectingFromId){state.connectingFromId=id;closeContext();render();toast('Agora clique com o botão direito em outro card e escolha “Conectar aqui”.')}else if(state.connectingFromId===id){state.connectingFromId=null;closeContext();render()}else{const from=state.connectingFromId,b=activeBoard();b.connections=b.connections||[];if(!b.connections.some(x=>(x.fromId===from&&x.toId===id)||(x.fromId===id&&x.toId===from))){checkpoint();b.connections.push({id:uid(),fromId:from,toId:id,color:'#222222',style:'solid'});touchProject();scheduleSave();toast('Cards conectados.')}else toast('Esses cards já estão conectados.');state.connectingFromId=null;render()}}
      else if(action==='cancelConnect'){state.connectingFromId=null;closeContext();render()}
      else if(action==='disconnect'){checkpoint();const b=activeBoard(),before=b.connections.length;b.connections=b.connections.filter(x=>x.fromId!==id&&x.toId!==id);if(state.connectingFromId===id)state.connectingFromId=null;touchProject();scheduleSave();render();toast(before===b.connections.length?'Este card não possui conexões.':'Card desconectado.')}
      else if(action==='toggleHead'){checkpoint();el.data.head=el.data.head===false;touchProject();scheduleSave();render()}
      else if(action==='arrowSolid'||action==='arrowDashed'||action==='arrowDotted'){checkpoint();el.data.style=action==='arrowSolid'?'solid':action==='arrowDashed'?'dashed':'dotted';touchProject();scheduleSave();render()}
      else if(action==='boardImage'){state.pendingBoardImageId=id;state.pendingFileType=null;const picker=$('#filePicker');picker.accept='image/*';picker.multiple=false;picker.click();closeContext()}
      else if(action==='removeBoardImage'){checkpoint();const oldAsset=el.data.imageAssetId;el.data.image='';el.data.imageAssetId='';el.data.imageDriveFileId='';oldAsset&&storage.deleteAsset(oldAsset).catch(console.warn);touchProject();scheduleSave();render()}
      else if(action==='duplicate'){checkpoint();const ids=state.selectedIds.includes(id)?state.selectedIds:[id];ids.forEach(nodeId=>{const e=clone(getElement(nodeId));e.id=uid();e.x+=24;e.y+=24;e.z=Date.now();activeBoard().elements.push(e)});touchProject();scheduleSave();render()}
      else if(action==='front'){checkpoint();state.selectedIds.forEach(nodeId=>{const e=getElement(nodeId);if(e)e.z=Date.now()});touchProject();scheduleSave();render()}
      else if(action==='back'){checkpoint();state.selectedIds.forEach(nodeId=>{const e=getElement(nodeId);if(e)e.z=2});touchProject();scheduleSave();render()}
      else if(action==='copy'){navigator.clipboard?.writeText(JSON.stringify({quaaadroElements:state.selectedIds.map(getElement)}));toast('Elemento copiado.');closeContext()}
      else if(action==='trash')trashElements(state.selectedIds.includes(id)?state.selectedIds:[id]);
    }));
  }

  function closeContext(doRender=false){state.context=null;document.querySelector('.context-menu')?.remove();if(doRender)render()}

  document.addEventListener('keydown',e=>{
    const editing=e.target.matches?.('input,textarea,[contenteditable=true]');
    if(e.code==='Space'&&!editing)state.spaceDown=true;
    if(e.key==='Escape'){state.moreOpen=false;state.trashOpen=false;state.boardSearchOpen=false;state.context=null;state.connectingFromId=null;hideCrumbPreview();if(state.screen==='board')render();}
    if(editing)return;
    const mod=e.ctrlKey||e.metaKey;
    if(mod&&e.key.toLowerCase()==='z'){e.preventDefault();e.shiftKey?redo():undo()}
    else if(mod&&e.key.toLowerCase()==='y'){e.preventDefault();redo()}
    else if(mod&&e.key.toLowerCase()==='s'){e.preventDefault();scheduleSave()}
    else if(mod&&e.key.toLowerCase()==='f'&&state.screen==='board'){e.preventDefault();state.boardSearchOpen=true;render();setTimeout(()=>$('#boardSearchInput')?.focus(),0)}
    else if(mod&&e.key.toLowerCase()==='d'&&state.screen==='board'){e.preventDefault();if(state.selectedIds.length){checkpoint();state.selectedIds.forEach(id=>{const n=clone(getElement(id));n.id=uid();n.x+=24;n.y+=24;n.z=Date.now();activeBoard().elements.push(n)});touchProject();scheduleSave();render()}}
    else if(e.key==='Delete'&&state.screen==='board'){trashElements([...state.selectedIds]);}
    else if(e.key==='F11'){e.preventDefault();document.fullscreenElement?document.exitFullscreen():document.documentElement.requestFullscreen()}
    else if(mod&&e.key==='0'&&state.screen==='board'){e.preventDefault();setViewportZoom(1,null,null,true)}
    else if(mod&&['+','='].includes(e.key)&&state.screen==='board'){e.preventDefault();setViewportZoom(state.viewport.zoom+.1,null,null,true)}
    else if(mod&&e.key==='-'&&state.screen==='board'){e.preventDefault();setViewportZoom(state.viewport.zoom-.1,null,null,true)}
  });
  document.addEventListener('keyup',e=>{if(e.code==='Space')state.spaceDown=false});

  document.addEventListener('paste',async e=>{
    if(state.screen!=='board'||e.target.matches?.('input,textarea,[contenteditable=true]'))return;
    const pos=state.lastPointer?screenToWorld(state.lastPointer.x,state.lastPointer.y):{x:200,y:140};
    const files=[...(e.clipboardData?.files||[])];
    if(files.length){e.preventDefault();checkpoint();await addFileElement(files[0],pos.x,pos.y);touchProject();scheduleSave();render();return}
    const text=e.clipboardData?.getData('text/plain')?.trim();if(!text)return;e.preventDefault();checkpoint();activeBoard().elements.push(/^https?:\/\//i.test(text)?createElement('link',pos.x,pos.y,{title:'',urls:[text]}):createElement('note',pos.x,pos.y,{text}));touchProject();scheduleSave();render();
  });

  $('#filePicker').addEventListener('change',async e=>{
    const files=[...e.target.files];if(!files.length){state.pendingBoardImageId=null;e.target.multiple=true;return}
    if(state.pendingBoardImageId){const el=getElement(state.pendingBoardImageId);try{if(el&&files[0]?.type?.startsWith('image/')){checkpoint();const blob=await optimizeImageFile(files[0],1200),saved=await saveAssetEverywhere(blob,{name:files[0].name,type:blob.type||files[0].type});const oldAsset=el.data.imageAssetId;el.data.image='';el.data.imageAssetId='';el.data.imageDriveFileId='';if(saved.kind==='drive'){el.data.image=saved.drive.url;el.data.imageDriveFileId=saved.drive.id}else el.data.imageAssetId=saved.assetId;oldAsset&&storage.deleteAsset(oldAsset).catch(console.warn);touchProject();scheduleSave();toast('Imagem do Board atualizada.')}}catch(err){console.error(err);toast(storageProblemMessage(err))}state.pendingBoardImageId=null;e.target.value='';e.target.multiple=true;render();return}
    checkpoint();let off=0,added=0;for(const f of files){const pos=state.fileDropPosition||{x:160,y:120};if(await addFileElement(f,pos.x+off,pos.y+off)){off+=20;added++}}e.target.value='';e.target.multiple=true;state.pendingFileType=null;state.fileDropPosition=null;if(added){touchProject();scheduleSave();render()}
  });

  window.addEventListener('beforeunload',()=>{const b=activeBoard();if(b)b.viewport=clone(state.viewport);try{localStorage.setItem('quaaadro_theme',state.theme)}catch{}});

  async function migrateEmbeddedAssets(){if(!storage.db)return false;let changed=false;const refs=[];const collectElement=e=>{const d=e?.data||{};if(e.type==='image'&&String(d.src||'').startsWith('data:'))refs.push({data:d,field:'src',assetField:'assetId',name:d.name||'Imagem'});if(e.type==='attachment'&&String(d.src||'').startsWith('data:'))refs.push({data:d,field:'src',assetField:'assetId',name:d.name||'Arquivo'});if(e.type==='board'&&String(d.image||'').startsWith('data:'))refs.push({data:d,field:'image',assetField:'imageAssetId',name:(d.title||'Board')+' - capa'})};state.projects.forEach(p=>{Object.values(p.boards||{}).forEach(b=>(b.elements||[]).forEach(collectElement));(p.trash||[]).forEach(t=>collectElement(t.element))});for(const ref of refs){const original=ref.data[ref.field];if(!original||ref.data[ref.assetField])continue;try{const blob=dataUrlToBlob(original),id=uid();ref.data[ref.field]='';ref.data[ref.assetField]=id;await storage.putAssetWithState(blob,{name:ref.name,type:blob.type},id,{version:state.version,theme:state.theme,projects:state.projects});changed=true}catch(e){ref.data[ref.field]=original;delete ref.data[ref.assetField];console.warn('Não foi possível migrar um arquivo antigo',e);toast(storageProblemMessage(e));break}}if(changed){try{localStorage.removeItem('quaaadro_html_state')}catch{}}return changed}

  setupRichToolbar();

  (async()=>{
    await storage.init();const saved=await storage.get();if(saved?.projects)state.projects=saved.projects;if(saved?.files?.driveConfig)saveDriveConfig(saved.files.driveConfig);state.theme=saved?.theme||localStorage.getItem('quaaadro_theme')||'light';applyTheme();
    state.projects.forEach(p=>{Object.values(p.boards||{}).forEach(b=>{b.elements=b.elements||[];b.connections=b.connections||[];b.elements.forEach(e=>{e.data=e.data||{};
      if(e.type==='note'&&e.data.text==='Escreva uma nota…')e.data.text='';
      if(e.type==='link'){if(e.data.title==='Novo link')e.data.title='';if(e.data.url==='https://')e.data.url='';if(!Array.isArray(e.data.urls))e.data.urls=[e.data.url||''];if(!e.data.urls.length)e.data.urls=[''];if(!e.data.youtubeTitles)e.data.youtubeTitles={};if(!e.data.youtubeTitleFailures)e.data.youtubeTitleFailures={};if(!e.data.linkPreviewV2){e.w=Math.max(e.w||0,300);e.h=Math.max(e.h||0,220);e.data.linkPreviewV2=true;}if(e.data.urls.some(youtubeVideoId)&&!e.data.youtubeCardV3){e.w=Math.max(e.w||0,310);e.h=Math.max(e.h||0,174);e.data.youtubeCardV3=true;}}
      if(e.type==='todo'){if(e.data.title==='Lista de tarefas')e.data.title='';(e.data.items||[]).forEach(i=>{if(['Primeira tarefa','Segunda tarefa','Nova tarefa'].includes(i.text))i.text=''});if(!(e.data.items||[]).length)e.data.items=[{id:uid(),text:'',done:false}];}
      if(e.type==='board'){if(['Novo Board','Novo board'].includes(e.data.title))e.data.title='';const child=getBoard(p,e.data.boardId);if(child&&['Novo Board','Novo board'].includes(child.name))child.name='';if(!e.data.color)e.data.color=stablePastel(e.id);if(e.data.image===undefined)e.data.image='';if(e.data.imageAssetId===undefined)e.data.imageAssetId='';if(!e.data.boardStyleV2){e.w=128;e.h=146;e.data.boardStyleV2=true}}
      if(e.type==='column'){if(e.data.title==='Nova coluna')e.data.title='';if(e.data.text===undefined)e.data.text='';if(/^Arraste elementos para organizar visualmente\.?$/i.test(String(e.data.text).trim()))e.data.text='';if(!e.data.textCardV2){const title=String(e.data.title||'').trim();if(title)e.data.text=title+(e.data.text?'\n'+e.data.text:'');e.data.title='';e.w=Math.max(220,e.w||0);e.h=Math.min(Math.max(140,e.h||0),240);e.data.textCardV2=true;}}
      if((e.type==='column'||e.type==='text')&&!e.data.richHtml&&e.data.text)e.data.richHtml=textToRichHtml(e.data.text);
      if(e.type==='comment'){if(e.data.title==='Comentário')e.data.title='';if(e.data.text==='Escreva um comentário…')e.data.text='';}
      if(e.type==='table'){if(e.data.title==='Tabela')e.data.title='';if(JSON.stringify(e.data.rows)==='[["Título 1","Título 2","Título 3"],["","",""],["","",""]]')e.data.rows=[['','',''],['','',''],['','','']];}
      if(e.type==='image'&&e.data.assetId===undefined)e.data.assetId='';if(e.type==='attachment'){if(e.data.assetId===undefined)e.data.assetId='';if(isPdfData(e.data)&&!e.data.pdfPreviewV1){e.w=Math.max(e.w||0,360);e.h=Math.max(e.h||0,300);e.data.pdfPreviewV1=true}}
      if(e.type==='color'&&!e.data.compactV2){e.w=Math.max(96,Math.round((e.w||225)*.5));e.h=Math.max(108,Math.round((e.h||255)*.5));e.data.compactV2=true;}
      if(e.type==='arrow'){if(e.data.head===undefined)e.data.head=true;if(!e.data.style)e.data.style='solid';if(!e.data.color)e.data.color='#222222'}
    })})});
    await migrateEmbeddedAssets();
    cleanupUnusedAssets().catch(console.warn);
    await prepareCloudAtStartup();
    render();
  })();
  if('serviceWorker' in navigator&&location.protocol!=='file:')navigator.serviceWorker.register('./sw.js').catch(console.warn);
})();
</script>
